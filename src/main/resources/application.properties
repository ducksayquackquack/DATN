spring.application.name=DATN-Nhom03

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:sqlserver://localhost:1433;databaseName=DirtyWave;encrypt=false;trustServerCertificate=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

server.port=${PORT:8080}
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-exception=true
server.error.include-stacktrace=on_param

vnpay.tmn-code=${VNPAY_TMN_CODE:}
vnpay.hash-secret=${VNPAY_HASH_SECRET:}
vnpay.return-url=${VNPAY_RETURN_URL:http://localhost:5173/payment-return}

# Mail lookup config (use environment variables in local/prod)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.lookup.mail.from=${LOOKUP_MAIL_FROM:${MAIL_USERNAME:}}

# Shipping quote origin defaults (used by /api/shipping/quote)
shipping.origin.province=${SHIPPING_ORIGIN_PROVINCE:Ha Noi}
shipping.origin.district=${SHIPPING_ORIGIN_DISTRICT:Tay Ho}
shipping.origin.ward=${SHIPPING_ORIGIN_WARD:Thuy Khue}

# ── Internal Assistant ──
assistant.enabled=${ASSISTANT_ENABLED:true}
assistant.demo-mode=${ASSISTANT_DEMO_MODE:true}
assistant.openai.api-key=${OPENAI_API_KEY:}
assistant.openai.model=${OPENAI_MODEL:gpt-4o-mini}


# Assistant config merged from dirtywave
assistant.allow-admin=true
assistant.allow-employee=true
assistant.max-tool-calls=5
assistant.openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1/chat/completions}
assistant.openai.temperature=${OPENAI_TEMPERATURE:0.25}
assistant.openai.connect-timeout-ms=${OPENAI_CONNECT_TIMEOUT_MS:5000}
assistant.openai.read-timeout-ms=${OPENAI_READ_TIMEOUT_MS:20000}

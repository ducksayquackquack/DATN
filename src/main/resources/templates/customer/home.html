<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>DirtyWave - Home</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
        }

        h1 {
            margin-bottom: 30px;
        }

        .category-container,
        .product-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 40px;
        }

        .category-box {
            padding: 10px 15px;
            border: 1px solid #ccc;
            cursor: pointer;
        }

        .product-box {
            width: 250px;
            border: 1px solid #ddd;
            padding: 15px;
        }

        .price {
            font-weight: bold;
        }

        .discount {
            color: red;
        }

        .final {
            color: green;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>DirtyWave Store</h1>

<hr>

<h2>Categories</h2>
<div id="categories" class="category-container"></div>

<hr>

<h2>Products</h2>
<div id="products" class="product-container"></div>

<script>
    async function loadHome() {
        const response = await fetch("/api/public/home");
        const data = await response.json();

        const categoriesDiv = document.getElementById("categories");
        const productsDiv = document.getElementById("products");

        // Render Categories
        data.categories.forEach(cat => {
            const div = document.createElement("div");
            div.className = "category-box";
            div.innerHTML = `
                <div><strong>${cat.tenDanhMuc}</strong></div>
                <div>Mã: ${cat.maDanhMuc}</div>
            `;
            categoriesDiv.appendChild(div);
        });

        // Render Products
        data.products.forEach(p => {
            const div = document.createElement("div");
            div.className = "product-box";

            let discountHtml = "";

            if (p.giaTriKhuyenMai) {
                const finalPrice = p.giaBan * (1 - p.giaTriKhuyenMai / 100);
                discountHtml = `
                    <div class="discount">-${p.giaTriKhuyenMai}%</div>
                    <div class="final">${formatPrice(finalPrice)}</div>
                `;
            }

            div.innerHTML = `
                <h3>${p.tenSanPham}</h3>
                <div>${p.moTa}</div>
                <div class="price">${formatPrice(p.giaBan)}</div>
                ${discountHtml}
            `;

            productsDiv.appendChild(div);
        });
    }

    function formatPrice(price) {
        return new Intl.NumberFormat('vi-VN').format(price) + " đ";
    }

    loadHome();
</script>

</body>
</html>
